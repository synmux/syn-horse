# This file controls the behavior of Trunk: https://docs.trunk.io/cli
# To learn more about the format of this file, see https://docs.trunk.io/reference/trunk-yaml
version: 0.1
cli:
  version: 1.25.0
# Trunk provides extensibility via plugins. (https://docs.trunk.io/plugins)
plugins:
  sources:
    - id: trunk
      ref: v1.7.6
      uri: https://github.com/trunk-io/plugins
# Many linters and tools depend on runtimes - configure them here. (https://docs.trunk.io/runtimes)
runtimes:
  enabled:
    - node@22.16.0
    - python@3.10.8
# This is the section where you manage your linters. (https://docs.trunk.io/check/configuration)
lint:
  disabled:
    - osv-scanner
  ignore:
    - linters:
        - ALL
      paths:
        - .agents/**
        - .claude/**
        - .data/**
        - .env
        - .gemini/**
        - .github/workflows/claude.y*ml
        - .github/workflows/claude-code-review.y*ml
        - .nuxt/**
        - .serena/**
        - .wrangler/**
        - worker-configuration.d.ts
    - linters:
        - markdownlint
      paths:
        - AGENTS*.md
  enabled:
    - taplo@0.10.0
    - actionlint@1.7.11
    - checkov@3.2.504
    - eslint@10.0.3
    - git-diff-check
    - markdownlint@0.48.0
    - oxipng@10.1.0
    - prettier@3.8.1
    - trufflehog@3.93.8
    - yamllint@1.38.0
actions:
  definitions:
    - id: bun-format-pre-commit
      display_name: Bun Format Pre-Commit
      description: Run 'bun format' before other pre-commit hooks
      run: bun format
      triggers:
        - git_hooks: [pre-commit]
  enabled:
    - bun-format-pre-commit
    - trunk-announce
    - trunk-check-pre-push
    - trunk-fmt-pre-commit
    - trunk-upgrade-available
