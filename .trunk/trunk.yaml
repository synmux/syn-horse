# This file controls the behavior of Trunk: https://docs.trunk.io/cli
# To learn more about the format of this file, see https://docs.trunk.io/reference/trunk-yaml
version: 0.1
cli:
  version: 1.25.0
# Trunk provides extensibility via plugins. (https://docs.trunk.io/plugins)
plugins:
  sources:
    - id: trunk
      ref: v1.8.0
      uri: https://github.com/trunk-io/plugins
# Many linters and tools depend on runtimes - configure them here. (https://docs.trunk.io/runtimes)
runtimes:
  enabled:
    - go@1.21.0
    - node@22.16.0
    - python@3.14.4
# This is the section where you manage your linters. (https://docs.trunk.io/check/configuration)
lint:
  disabled:
    - osv-scanner
  enabled:
    - svgo@4.0.1
    - grype@0.112.0
    - shellcheck@0.11.0
    - shfmt@3.6.0
    - trunk-toolbox@0.7.0
    - oxipng@10.1.1
    - actionlint@1.7.12
    - checkov@3.2.526
    - eslint@10.3.0
    - git-diff-check
    - markdownlint@0.48.0
    - prettier@3.8.3
    - taplo@0.10.0
    - trufflehog@3.95.2
    - yamllint@1.38.0
  ignore:
    - linters:
        - ALL
      paths:
        - _cloudflare/env.d.ts
        - worker-configuration.d.ts
        - .claude/**
        - _DIO/**
        - _DSOY/**
    - linters:
        - yamllint
        - checkov
      paths:
        - .github/workflows/claude*.y*ml
    - linters:
        - trunk-toolbox
      paths:
        - "**/*.gif"
        - "**/*.ico"
        - "**/*.jpg"
        - "**/*.pdf"
        - "**/*.png"
        - "**/*.avif"
        - "**/*.vsix"
        - "**/*.webp"
        - "**/*.zip"
        - .devcontainer/devcontainer.json
        - docs/**
        - sql/redirects.sql
actions:
  definitions:
    - id: bun-install
      display_name: Install dependencies with bun
      description: Run bun install to ensure dependencies are up to date
      run: bun install && bun run format
      triggers:
        - git_hooks:
            - pre-commit
  enabled:
    - trunk-announce
    - trunk-check-pre-push
    - trunk-fmt-pre-commit
    - trunk-upgrade-available
