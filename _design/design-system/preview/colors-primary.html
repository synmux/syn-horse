<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>colors — primary</title>
    <link rel="stylesheet" href="_card.css" />
  </head>
  <body>
    <div class="card">
      <div class="card-grain"></div>
      <div class="grid" style="grid-template-columns: repeat(5, 1fr); gap: 12px">
        <div>
          <div class="swatch" style="background: #0d0221"></div>
          <div class="swatch-label"><span class="name">--void</span><span>0d0221</span></div>
        </div>
        <div>
          <div class="swatch" style="background: #ff71ce"></div>
          <div class="swatch-label"><span class="name">--hot</span><span>ff71ce</span></div>
        </div>
        <div>
          <div class="swatch" style="background: #01cdfe"></div>
          <div class="swatch-label"><span class="name">--cool</span><span>01cdfe</span></div>
        </div>
        <div>
          <div class="swatch" style="background: #b967ff"></div>
          <div class="swatch-label"><span class="name">--lilac</span><span>b967ff</span></div>
        </div>
        <div>
          <div class="swatch" style="background: #fffb96"></div>
          <div class="swatch-label"><span class="name">--pop</span><span>fffb96</span></div>
        </div>
      </div>
    </div>
  </body>
</html>
