<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>badges & tags</title>
    <link rel="stylesheet" href="_card.css" />
    <style>
      .b {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 4px 10px;
        font-family: var(--font-mono);
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        border: 1px solid var(--paper-3);
      }
      .b-ok {
        color: var(--ok);
        border-color: var(--ok);
      }
      .b-warn {
        color: var(--pop);
        border-color: var(--pop);
      }
      .b-err {
        color: var(--danger);
        border-color: var(--danger);
      }
      .b-hot {
        color: var(--hot);
        border-color: var(--hot);
      }
      .b-cool {
        color: var(--cool);
        border-color: var(--cool);
      }
      .b-pill {
        border-radius: 999px;
      }
      .dot {
        width: 6px;
        height: 6px;
        border-radius: 999px;
        background: currentColor;
        box-shadow: 0 0 8px currentColor;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="card-grain"></div>
      <div class="col" style="gap: 10px">
        <div class="row" style="gap: 8px">
          <span class="b b-ok"><span class="dot"></span>ONLINE</span>
          <span class="b b-warn"><span class="dot"></span>UNSTABLE</span>
          <span class="b b-err"><span class="dot"></span>BROKEN</span>
        </div>
        <div class="row" style="gap: 8px">
          <span class="b b-hot">SYNTH</span>
          <span class="b b-cool">PUBLIC</span>
          <span class="b">DRAFT</span>
          <span class="b b-pill b-hot">PRO</span>
        </div>
      </div>
    </div>
  </body>
</html>
