<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>type — display</title>
    <link rel="stylesheet" href="_card.css" />
  </head>
  <body>
    <div class="card">
      <div class="card-grain"></div>
      <div class="col" style="gap: 14px">
        <div style="display: flex; justify-content: space-between; align-items: baseline">
          <span class="tag">VT323 · display · self-hosted</span>
          <span class="tag" style="color: var(--fg-3)">.ttf · 1 weight · pixel grid</span>
        </div>
        <div
          style="
            font-family: var(--font-display);
            font-size: 120px;
            line-height: 1.05;
            color: var(--fg-1);
            padding-bottom: 10px;
          "
        >
          syn.horse
        </div>
        <div
          style="
            font-family: var(--font-display);
            font-size: 56px;
            line-height: 1.15;
            color: var(--hot);
            padding-bottom: 6px;
          "
        >
          computers got too polite.
        </div>
        <div style="display: flex; gap: 28px; flex-wrap: wrap; align-items: baseline">
          <span style="font-family: var(--font-display); font-size: 40px; line-height: 1.15; color: var(--cool)"
            >section header</span
          >
          <span style="font-family: var(--font-display); font-size: 28px; line-height: 1.15; color: var(--lilac)"
            >subhead</span
          >
          <span style="font-family: var(--font-display); font-size: 18px; line-height: 1.2; color: var(--paper-2)"
            >small label</span
          >
        </div>
        <div
          style="
            font-family: var(--font-mono);
            font-size: 11px;
            color: var(--fg-3);
            letter-spacing: 0.08em;
            margin-top: 6px;
          "
        >
          USE: h1, h2, marquees, banners, big numerals. one weight only — never <i>fake</i> bold or italic.
        </div>
      </div>
    </div>
  </body>
</html>
