<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>shadows / glows</title>
    <link rel="stylesheet" href="_card.css" />
  </head>
  <body>
    <div class="card">
      <div class="card-grain"></div>
      <div class="row" style="gap: 20px; padding: 12px 4px">
        <div class="col" style="gap: 8px; align-items: center">
          <div
            style="
              width: 80px;
              height: 60px;
              background: var(--void-2);
              border: 1px solid var(--void-4);
              box-shadow: 0 0 24px rgba(255, 113, 206, 0.5);
            "
          ></div>
          <span class="tag">--glow-hot</span>
        </div>
        <div class="col" style="gap: 8px; align-items: center">
          <div
            style="
              width: 80px;
              height: 60px;
              background: var(--void-2);
              border: 1px solid var(--void-4);
              box-shadow: 0 0 24px rgba(1, 205, 254, 0.5);
            "
          ></div>
          <span class="tag">--glow-cool</span>
        </div>
        <div class="col" style="gap: 8px; align-items: center">
          <div
            style="
              width: 80px;
              height: 60px;
              background: var(--void-2);
              border: 1px solid var(--void-4);
              box-shadow: 0 0 24px rgba(185, 103, 255, 0.5);
            "
          ></div>
          <span class="tag">--glow-lilac</span>
        </div>
        <div class="col" style="gap: 8px; align-items: center">
          <div
            style="
              width: 80px;
              height: 60px;
              background: var(--void-2);
              box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.1);
              border: 1px solid var(--void-4);
            "
          ></div>
          <span class="tag">--inset-edge</span>
        </div>
        <div class="col" style="gap: 8px; align-items: center">
          <div
            style="
              font-family: var(--font-display);
              font-size: 48px;
              color: var(--paper);
              text-shadow:
                2px 0 0 var(--hot),
                -2px 0 0 var(--cool);
              line-height: 1;
            "
          >
            Aa
          </div>
          <span class="tag">--rgb-split</span>
        </div>
      </div>
    </div>
  </body>
</html>
