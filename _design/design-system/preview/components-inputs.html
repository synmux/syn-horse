<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>inputs</title>
    <link rel="stylesheet" href="_card.css" />
    <style>
      .field {
        display: block;
        width: 100%;
        padding: 10px 12px;
        background: var(--void-2);
        border: 1px solid var(--paper-3);
        color: var(--paper);
        font-family: var(--font-body);
        font-size: 14px;
        border-radius: 0;
      }
      .field::placeholder {
        color: var(--fg-3);
      }
      .field:focus {
        outline: 2px solid var(--cool);
        outline-offset: 2px;
        box-shadow: 0 0 12px rgba(1, 205, 254, 0.5);
        border-color: var(--cool);
      }
      .label {
        font-family: var(--font-mono);
        font-size: 11px;
        color: var(--fg-3);
        text-transform: uppercase;
        letter-spacing: 0.08em;
        display: block;
        margin-bottom: 4px;
      }
      .check {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-size: 13px;
        color: var(--paper);
      }
      .check input {
        accent-color: var(--hot);
        width: 14px;
        height: 14px;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="card-grain"></div>
      <div class="col" style="gap: 10px">
        <div><span class="label">handle</span><input class="field" value="@horse.dril" /></div>
        <div><span class="label">password</span><input class="field" type="password" value="••••••••" /></div>
        <div>
          <span class="label">notes</span
          ><textarea class="field" rows="2" placeholder="say something cursed">today i became a synth</textarea>
        </div>
        <label class="check"><input type="checkbox" checked /> i accept the terms (i did not read them)</label>
      </div>
    </div>
  </body>
</html>
