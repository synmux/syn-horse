<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>card</title>
    <link rel="stylesheet" href="_card.css" />
  </head>
  <body>
    <div class="card">
      <div class="card-grain"></div>
      <div
        style="
          background: var(--void-2);
          border: 1px solid var(--void-4);
          padding: 16px;
          box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.06);
          position: relative;
        "
      >
        <div
          style="
            position: absolute;
            top: 8px;
            right: 10px;
            font-family: var(--font-mono);
            font-size: 10px;
            color: var(--fg-3);
            letter-spacing: 0.08em;
          "
        >
          ◆ SYNTH-0421
        </div>
        <div
          style="
            font-family: var(--font-display);
            font-size: 28px;
            line-height: 1;
            color: var(--paper);
            margin-bottom: 6px;
          "
        >
          my entire posting history
        </div>
        <div style="font-size: 13px; color: var(--fg-2); line-height: 1.5">
          a folder of unhinged screenshots and drafts. updated every time you press a wrong button.
        </div>
        <div style="display: flex; gap: 8px; margin-top: 12px">
          <span class="tag" style="border-color: var(--hot); color: var(--hot)">PUBLIC</span>
          <span class="tag">421 items</span>
          <span class="tag">edited 3m ago</span>
        </div>
      </div>
    </div>
  </body>
</html>
