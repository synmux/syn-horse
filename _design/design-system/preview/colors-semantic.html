<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>colors — semantic</title>
    <link rel="stylesheet" href="_card.css" />
  </head>
  <body>
    <div class="card">
      <div class="card-grain"></div>
      <div class="grid" style="grid-template-columns: repeat(3, 1fr); gap: 12px">
        <div>
          <div class="swatch" style="background: #62ffaa"></div>
          <div class="swatch-label"><span class="name">--success</span><span>ok / saved</span></div>
        </div>
        <div>
          <div class="swatch" style="background: #fffb96"></div>
          <div class="swatch-label"><span class="name">--warn</span><span>look here</span></div>
        </div>
        <div>
          <div class="swatch" style="background: #ff003c"></div>
          <div class="swatch-label"><span class="name">--error</span><span>destruction</span></div>
        </div>
        <div>
          <div class="swatch" style="background: #ff71ce"></div>
          <div class="swatch-label"><span class="name">--accent</span><span>brand</span></div>
        </div>
        <div>
          <div class="swatch" style="background: #01cdfe"></div>
          <div class="swatch-label"><span class="name">--accent-2</span><span>focus</span></div>
        </div>
        <div>
          <div class="swatch" style="background: #b967ff"></div>
          <div class="swatch-label"><span class="name">--accent-3</span><span>decorative</span></div>
        </div>
      </div>
    </div>
  </body>
</html>
