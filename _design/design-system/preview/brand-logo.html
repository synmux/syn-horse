<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>logo + brand mark</title>
    <link rel="stylesheet" href="_card.css" />
  </head>
  <body>
    <div class="card" style="display: flex; align-items: center; gap: 32px">
      <div class="card-grain"></div>
      <img src="../assets/logo-wordmark.svg" alt="syn.horse" style="height: 60px" />
      <img src="../assets/logo-mark.svg" alt="" style="height: 64px; width: 64px; image-rendering: pixelated" />
      <div class="col" style="gap: 4px">
        <span class="tag">wordmark + pixel mark</span>
        <span style="font-family: var(--font-mono); font-size: 11px; color: var(--fg-3)"
          >never recolor. clearspace = 1× cap-height.</span
        >
      </div>
    </div>
  </body>
</html>
