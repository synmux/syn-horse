<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>colors — neutrals</title>
    <link rel="stylesheet" href="_card.css" />
  </head>
  <body>
    <div class="card">
      <div class="card-grain"></div>
      <div class="grid" style="grid-template-columns: repeat(4, 1fr); gap: 12px">
        <div>
          <div class="swatch" style="background: #14082e"></div>
          <div class="swatch-label"><span class="name">--void-2</span><span>14082e</span></div>
        </div>
        <div>
          <div class="swatch" style="background: #1d0d3d"></div>
          <div class="swatch-label"><span class="name">--void-3</span><span>1d0d3d</span></div>
        </div>
        <div>
          <div class="swatch" style="background: #2a1656"></div>
          <div class="swatch-label"><span class="name">--void-4</span><span>2a1656</span></div>
        </div>
        <div>
          <div class="swatch" style="background: #4a3d63"></div>
          <div class="swatch-label"><span class="name">--paper-4</span><span>4a3d63</span></div>
        </div>
        <div>
          <div class="swatch" style="background: #8b7aa8"></div>
          <div class="swatch-label"><span class="name">--paper-3</span><span>8b7aa8</span></div>
        </div>
        <div>
          <div class="swatch" style="background: #d9c8e8"></div>
          <div class="swatch-label"><span class="name">--paper-2</span><span>d9c8e8</span></div>
        </div>
        <div>
          <div class="swatch" style="background: #fff7ff"></div>
          <div class="swatch-label"><span class="name">--paper</span><span>fff7ff</span></div>
        </div>
        <div>
          <div class="swatch" style="background: linear-gradient(90deg, #0d0221, #fff7ff)"></div>
          <div class="swatch-label"><span class="name">scale</span><span>void→paper</span></div>
        </div>
      </div>
    </div>
  </body>
</html>
