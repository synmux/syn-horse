<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>spacing</title>
    <link rel="stylesheet" href="_card.css" />
  </head>
  <body>
    <div class="card">
      <div class="card-grain"></div>
      <div class="col" style="gap: 8px">
        <span class="tag">4px base grid · --s-N tokens</span>
        <div
          style="
            display: flex;
            flex-direction: column;
            gap: 6px;
            font-family: var(--font-mono);
            font-size: 11px;
            color: var(--fg-3);
          "
        >
          <div style="display: flex; align-items: center; gap: 8px">
            <span style="width: 48px">s-1 4</span
            ><span style="display: inline-block; height: 10px; width: 4px; background: var(--hot)"></span>
          </div>
          <div style="display: flex; align-items: center; gap: 8px">
            <span style="width: 48px">s-2 8</span
            ><span style="display: inline-block; height: 10px; width: 8px; background: var(--hot)"></span>
          </div>
          <div style="display: flex; align-items: center; gap: 8px">
            <span style="width: 48px">s-3 12</span
            ><span style="display: inline-block; height: 10px; width: 12px; background: var(--hot)"></span>
          </div>
          <div style="display: flex; align-items: center; gap: 8px">
            <span style="width: 48px">s-4 16</span
            ><span style="display: inline-block; height: 10px; width: 16px; background: var(--hot)"></span>
          </div>
          <div style="display: flex; align-items: center; gap: 8px">
            <span style="width: 48px">s-5 24</span
            ><span style="display: inline-block; height: 10px; width: 24px; background: var(--hot)"></span>
          </div>
          <div style="display: flex; align-items: center; gap: 8px">
            <span style="width: 48px">s-6 32</span
            ><span style="display: inline-block; height: 10px; width: 32px; background: var(--hot)"></span>
          </div>
          <div style="display: flex; align-items: center; gap: 8px">
            <span style="width: 48px">s-7 48</span
            ><span style="display: inline-block; height: 10px; width: 48px; background: var(--hot)"></span>
          </div>
          <div style="display: flex; align-items: center; gap: 8px">
            <span style="width: 48px">s-8 64</span
            ><span style="display: inline-block; height: 10px; width: 64px; background: var(--hot)"></span>
          </div>
          <div style="display: flex; align-items: center; gap: 8px">
            <span style="width: 48px">s-9 96</span
            ><span style="display: inline-block; height: 10px; width: 96px; background: var(--hot)"></span>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
