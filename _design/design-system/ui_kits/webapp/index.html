<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>syn.horse — webapp</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="root"></div>

    <script
      src="https://unpkg.com/react@18.3.1/umd/react.development.js"
      integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"
      integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"
      integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y"
      crossorigin="anonymous"
    ></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

    <script type="text/babel" src="Shell.jsx" data-screen-label="00 Shell"></script>
    <script type="text/babel" src="Tile.jsx"></script>
    <script type="text/babel" src="Pages.jsx"></script>

    <script type="text/babel" data-presets="env,react">
      const { useState, useEffect } = React

      const ROUTES = ["dashboard", "compose", "detail", "settings", "404"]
      const LABELS = {
        dashboard: "01 Dashboard",
        compose: "02 Compose",
        detail: "03 Detail",
        settings: "04 Settings",
        404: "05 NotFound"
      }

      function App() {
        const [route, setRoute] = useState("dashboard")
        const [synth, setSynth] = useState(null)
        const [palette, setPalette] = useState(false)

        useEffect(() => {
          function onKey(e) {
            if ((e.metaKey || e.ctrlKey) && e.key === "k") {
              e.preventDefault()
              setPalette((p) => !p)
            } else if (e.key === "Escape") setPalette(false)
            else if (e.key === "[") setRoute((r) => ROUTES[(ROUTES.indexOf(r) - 1 + ROUTES.length) % ROUTES.length])
            else if (e.key === "]") setRoute((r) => ROUTES[(ROUTES.indexOf(r) + 1) % ROUTES.length])
          }
          window.addEventListener("keydown", onKey)
          return () => window.removeEventListener("keydown", onKey)
        }, [])

        useEffect(() => {
          if (window.lucide) window.lucide.createIcons()
        }, [route, palette])

        const navigate = (id) => {
          setRoute(id)
          setPalette(false)
        }
        const openSynth = (s) => {
          setSynth(s)
          setRoute("detail")
        }

        return (
          <div data-screen-label={LABELS[route]}>
            <Shell route={route} active={route} onNavigate={navigate}>
              {route === "dashboard" && <DashboardPage onOpenSynth={openSynth} />}
              {route === "compose" && <ComposePage onSave={() => navigate("dashboard")} />}
              {route === "detail" && <DetailPage synth={synth} onBack={() => navigate("dashboard")} />}
              {route === "settings" && <SettingsPage />}
              {route === "404" && <NotFoundPage onGoHome={() => navigate("dashboard")} />}
            </Shell>
            {palette && <CommandPalette onClose={() => setPalette(false)} onNavigate={navigate} />}
            <div
              style={{
                position: "fixed",
                bottom: 40,
                right: 16,
                fontFamily: "var(--font-mono)",
                fontSize: 10,
                color: "var(--fg-3)",
                letterSpacing: ".08em",
                zIndex: 10000,
                pointerEvents: "none"
              }}
            >
              [ ⌘K · [ · ] ]
            </div>
          </div>
        )
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />)
    </script>
  </body>
</html>
