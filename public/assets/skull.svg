<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" shape-rendering="crispEdges" viewBox="0 0 32 32">
  <g fill="#ff71ce">
    <!-- cranium dome -->
    <rect x="10" y="2" width="12" height="2"/>
    <rect x="8" y="4" width="16" height="2"/>
    <rect x="6" y="6" width="20" height="2"/>
    <!-- brow + eye sockets (carved gaps at cols 5-6 and 9-10) -->
    <rect x="6" y="8" width="4" height="2"/>
    <rect x="14" y="8" width="4" height="2"/>
    <rect x="22" y="8" width="4" height="2"/>
    <rect x="6" y="10" width="4" height="2"/>
    <rect x="14" y="10" width="4" height="2"/>
    <rect x="22" y="10" width="4" height="2"/>
    <!-- cheeks -->
    <rect x="6" y="12" width="20" height="2"/>
    <!-- nose (carved gap at cols 7-8) -->
    <rect x="8" y="14" width="6" height="2"/>
    <rect x="18" y="14" width="6" height="2"/>
    <!-- jaw -->
    <rect x="8" y="16" width="16" height="2"/>
    <!-- teeth -->
    <rect x="8" y="18" width="4" height="2"/>
    <rect x="14" y="18" width="4" height="2"/>
    <rect x="20" y="18" width="4" height="2"/>
    <!-- crossed bones (X) with flared ends -->
    <rect x="2" y="20" width="6" height="2"/>
    <rect x="24" y="20" width="6" height="2"/>
    <rect x="8" y="22" width="4" height="2"/>
    <rect x="20" y="22" width="4" height="2"/>
    <rect x="12" y="24" width="8" height="2"/>
    <rect x="12" y="26" width="8" height="2"/>
    <rect x="8" y="28" width="4" height="2"/>
    <rect x="20" y="28" width="4" height="2"/>
    <rect x="2" y="30" width="6" height="2"/>
    <rect x="24" y="30" width="6" height="2"/>
  </g>
</svg>
