<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Spinning Horse</title>
    <style>
      :root {
        color-scheme: dark;
      }

      html,
      body {
        height: 100%;
        padding: 0;
        margin: 0;
        overflow: hidden;
        font-family:
          -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue",
          Arial, sans-serif;
        color: #e8e8ee;
        background: #0b0b0f;
      }

      .stage {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        background:
          radial-gradient(
            ellipse at center,
            rgba(80, 70, 120, 0.18) 0%,
            rgba(11, 11, 15, 0) 60%
          ),
          #0b0b0f;
      }

      .horse {
        position: relative;
        width: min(80vmin, 720px);
        aspect-ratio: 1 / 1;
        filter: drop-shadow(0 30px 50px rgba(0, 0, 0, 0.6));
      }

      .horse img {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: contain;
        opacity: 0;
        will-change: opacity;
      }

      .horse img.active {
        opacity: 1;
      }

      .controls {
        position: fixed;
        bottom: 24px;
        left: 50%;
        display: flex;
        gap: 8px;
        align-items: center;
        padding: 10px 14px;
        font-size: 13px;
        background: rgba(20, 20, 28, 0.7);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 999px;
        backdrop-filter: blur(10px);
        transform: translateX(-50%);
      }

      .controls button {
        padding: 6px 12px;
        font: inherit;
        color: inherit;
        appearance: none;
        cursor: pointer;
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 999px;
      }

      .controls button:hover {
        background: rgba(255, 255, 255, 0.12);
      }

      .controls input[type="range"] {
        width: 160px;
        accent-color: #8a7dff;
      }

      .controls label {
        opacity: 0.75;
      }
    </style>
  </head>
  <body>
    <div class="stage">
      <div class="horse" id="horse" aria-label="Spinning horse animation"></div>
    </div>

    <div class="controls">
      <button id="toggle" type="button">Pause</button>
      <button id="reverse" type="button">Reverse</button>
      <label for="speed">Speed</label>
      <input id="speed" type="range" min="1" max="60" value="24">
    </div>

    <script>
      "use strict";
      // Generate frame angles from 0 to 345 in 15 degree increments,
      // matching the file naming convention (-180..180 by 15, with 180 == -180).
      const angles = [];
      for (let a = 0; a < 360; a += 15) {
        // Map angles > 180 to the corresponding negative value so they match
        // the source filenames (e.g. 195 -> -165).
        angles.push(a <= 180 ? a : a - 360);
      }

      const horse = document.getElementById("horse");
      const imgs = angles.map((angle) => {
        const img = new Image();
        img.src = `Generative Object (${angle}, 0).png`;
        img.alt = "";
        img.decoding = "async";
        img.loading = "eager";
        horse.appendChild(img);
        return img;
      });

      let current = 0;
      let direction = 1;
      let fps = 24;
      let playing = true;
      let last = performance.now();

      imgs[current].classList.add("active");

      function tick(now) {
        const interval = 1000 / fps;
        if (playing && now - last >= interval) {
          imgs[current].classList.remove("active");
          current = (current + direction + imgs.length) % imgs.length;
          imgs[current].classList.add("active");
          last = now;
        }
        requestAnimationFrame(tick);
      }
      requestAnimationFrame(tick);

      const toggleBtn = document.getElementById("toggle");
      toggleBtn.addEventListener("click", () => {
        playing = !playing;
        toggleBtn.textContent = playing ? "Pause" : "Play";
      });

      document.getElementById("reverse").addEventListener("click", () => {
        direction *= -1;
      });

      document.getElementById("speed").addEventListener("input", (e) => {
        fps = Number(e.target.value);
      });
    </script>
  </body>
</html>
